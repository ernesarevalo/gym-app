<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GymApp - Iniciar Sesión</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card p-4 shadow" style="width: 100%; max-width: 420px;">
  <div class="d-flex justify-content-end mb-2">
    <button id="themeToggleBtn" class="theme-toggle-btn">🌙 Modo Oscuro</button>
  </div>
  <h2 id="appLogo" class="app-logo text-center mb-4">💪 GymApp</h2>

  <div id="authError" class="alert alert-danger d-none"></div>
  <div id="authInfo" class="alert alert-info d-none"></div>

  <!-- Toggle entre Login y Registro -->
  <div class="d-flex mb-3 gap-2">
    <button type="button" id="tabLogin" class="btn btn-sm btn-primary flex-grow-1">Iniciar Sesión</button>
    <button type="button" id="tabRegister" class="btn btn-sm btn-outline-light flex-grow-1">Crear Cuenta</button>
  </div>

  <!-- FORM LOGIN -->
  <form id="formLogin">
    <div class="mb-3">
      <label class="form-label">Correo electrónico o nombre de usuario</label>
      <input type="text" class="form-control" id="loginIdentifier" required
             placeholder="tu@correo.com  ó  tu_usuario">
    </div>
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="loginPassword" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary w-100 mb-2">Iniciar Sesión</button>
  </form>

  <!-- FORM REGISTRO -->
  <form id="formRegister" class="d-none">
    <div class="mb-3">
      <label class="form-label">Nombre completo</label>
      <input type="text" class="form-control" id="regNombre" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Nombre de usuario</label>
      <input type="text" class="form-control" id="regUsername" required minlength="3"
             pattern="[a-zA-Z0-9_\.]+" title="Solo letras, números, punto y guión bajo">
      <div class="form-text">Sin espacios. Lo vas a poder usar para iniciar sesión en vez del correo.</div>
    </div>
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" id="regEmail" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="regPassword" required minlength="6">
    </div>
    <button type="submit" class="btn btn-primary w-100 mb-2">Crear Cuenta</button>
  </form>

  <div class="text-center my-2">— o —</div>

  <button id="btnGoogle" class="btn btn-light w-100 d-flex align-items-center justify-content-center gap-2">
    <svg width="20" height="20" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.5z"/>
      <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 16 19 13 24 13c3.1 0 5.9 1.2 8 3.1l5.7-5.7C34.6 6.1 29.6 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
      <path fill="#4CAF50" d="M24 44c5.5 0 10.5-2.1 14.3-5.6l-6.6-5.4C29.7 34.6 27 35.5 24 35.5c-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.6 39.6 16.3 44 24 44z"/>
      <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.2 4.3-4.1 5.7l6.6 5.4C41.4 35.6 44 30.2 44 24c0-1.3-.1-2.7-.4-3.5z"/>
    </svg>
    Iniciar sesión con Google
  </button>
</div>

<!-- SDKs de Firebase (App + Auth + Firestore) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/beast-mascot.js') }}"></script>
<script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
