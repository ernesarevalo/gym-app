<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GymApp - Iniciar Sesión</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card p-4 shadow" style="width: 100%; max-width: 420px;">
  <h2 class="text-center mb-4">💪 GymApp</h2>

  <div id="authError" class="alert alert-danger d-none"></div>

  <form id="formAuth">
    <div class="mb-3">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="form-control" id="email" required>
    </div>
    <div class="mb-3">
      <label class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="password" required minlength="6">
    </div>
    <button type="submit" id="btnLogin" class="btn btn-primary w-100 mb-2">Iniciar Sesión</button>
    <button type="button" id="btnRegister" class="btn btn-outline-light w-100 mb-3">Crear Cuenta</button>
  </form>

  <div class="text-center mb-2">— o —</div>

  <button id="btnGoogle" class="btn btn-light w-100 d-flex align-items-center justify-content-center gap-2">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20" alt="Google">
    Iniciar sesión con Google
  </button>
</div>

<!-- SDKs de Firebase (App + Auth + Firestore) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
</body>
</html>
