<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GymApp - Cuéntanos sobre ti</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">

<div class="card p-4 shadow" style="width:100%; max-width:520px;">
  <div class="d-flex justify-content-end mb-2">
    <button id="themeToggleBtn" class="theme-toggle-btn">🌙 Modo Oscuro</button>
  </div>
  <h3 id="appLogo" class="app-logo mb-4 text-center">Cuéntanos sobre ti 🏋️</h3>

  <form id="formOnboarding">
    <div class="mb-3">
      <label class="form-label">Fecha de nacimiento</label>
      <input type="date" class="form-control" id="fechaNacimiento" required>
    </div>

    <div class="mb-3">
      <label class="form-label">Nivel de experiencia</label>
      <select class="form-select" id="nivel" required>
        <option value="">Selecciona...</option>
        <option value="Principiante">Principiante</option>
        <option value="Intermedio">Intermedio</option>
        <option value="Avanzado">Avanzado</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label">Días disponibles por semana</label>
      <select class="form-select" id="dias" required>
        <option value="">Selecciona...</option>
        <option value="3">3 días</option>
        <option value="4">4 días</option>
        <option value="5">5 días</option>
        <option value="6">6 días</option>
      </select>
    </div>

    <div class="mb-4">
      <label class="form-label">Enfoque del entrenamiento</label>
      <select class="form-select" id="enfoque" required>
        <option value="">Selecciona...</option>
        <option value="Fuerza">Fuerza (1-5 repeticiones)</option>
        <option value="Hipertrofia">Hipertrofia (6-12 repeticiones)</option>
        <option value="Resistencia">Resistencia muscular (15+ repeticiones)</option>
      </select>
    </div>

    <button type="submit" class="btn btn-primary w-100">Generar mi rutina</button>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/beast-mascot.js') }}"></script>
<script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
<script src="{{ url_for('static', filename='js/exercises-catalog.js') }}"></script>
<script src="{{ url_for('static', filename='js/onboarding.js') }}"></script>
</body>
</html>
