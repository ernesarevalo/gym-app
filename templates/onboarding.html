<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GymApp - Cuéntanos sobre ti</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center py-4" style="min-height:100vh;">

<div class="card p-4 shadow" style="width:100%; max-width:560px;">
  <div class="d-flex justify-content-end mb-2">
    <button id="themeToggleBtn" class="theme-toggle-btn">🌙 Modo Oscuro</button>
  </div>
  <h3 id="appLogo" class="app-logo mb-1 text-center">Cuéntanos sobre ti 🏋️</h3>
  <p class="text-secondary text-center small mb-4">Respondé estas preguntas una sola vez. Siempre las podés editar desde tu perfil.</p>

  <form id="formOnboarding">

    <!-- DATOS PERSONALES -->
    <div class="mb-3">
      <label class="form-label">📅 Fecha de nacimiento</label>
      <input type="date" class="form-control" id="fechaNacimiento" required>
    </div>

    <!-- NIVEL -->
    <div class="mb-3">
      <label class="form-label">🎯 Nivel de experiencia</label>
      <select class="form-select" id="nivel" required>
        <option value="">Selecciona...</option>
        <option value="Principiante">Principiante — menos de 1 año entrenando</option>
        <option value="Intermedio">Intermedio — entre 1 y 3 años</option>
        <option value="Avanzado">Avanzado — más de 3 años</option>
      </select>
      <div id="nivelHint" class="form-text d-none"></div>
    </div>

    <!-- DÍAS -->
    <div class="mb-3">
      <label class="form-label">📆 Días disponibles por semana</label>
      <select class="form-select" id="dias" required>
        <option value="">Selecciona...</option>
        <option value="3">3 días</option>
        <option value="4">4 días</option>
        <option value="5">5 días</option>
        <option value="6">6 días</option>
      </select>
    </div>

    <!-- TIEMPO POR SESIÓN -->
    <div class="mb-3">
      <label class="form-label">⏱️ Tiempo disponible por sesión</label>
      <select class="form-select" id="tiempoSesion" required>
        <option value="">Selecciona...</option>
        <option value="45">Hasta 45 minutos — sesiones cortas e intensas</option>
        <option value="60">Entre 45 y 60 minutos — sesiones estándar</option>
        <option value="90">Entre 60 y 90 minutos — sesiones completas</option>
        <option value="120">Más de 90 minutos — sesiones largas</option>
      </select>
      <div id="tiempoHint" class="form-text d-none"></div>
    </div>

    <!-- EQUIPAMIENTO -->
    <div class="mb-3">
      <label class="form-label">🏋️ Equipamiento disponible</label>
      <select class="form-select" id="equipamiento" required>
        <option value="">Selecciona...</option>
        <option value="gimnasio">Gimnasio comercial completo (barras, máquinas, poleas, todo)</option>
        <option value="basico">Gimnasio básico / edificio (mancuernas, máquinas simples, alguna barra)</option>
        <option value="casa">En casa (mancuernas, bandas elásticas y/o peso corporal)</option>
      </select>
      <div id="equipamientoHint" class="form-text d-none"></div>
    </div>

    <!-- ENFOQUE -->
    <div class="mb-4">
      <label class="form-label">💪 Enfoque del entrenamiento</label>
      <select class="form-select" id="enfoque" required>
        <option value="">Selecciona...</option>
        <option value="Fuerza">Fuerza — pocos reps, mucho peso, ganar fuerza máxima</option>
        <option value="Hipertrofia">Hipertrofia — rango medio, crecer músculo (recomendado)</option>
        <option value="Resistencia">Resistencia muscular — muchos reps, mejorar la capacidad de trabajo</option>
      </select>
    </div>

    <div id="splitPreview" class="alert alert-info d-none small mb-3"></div>

    <button type="submit" class="btn btn-primary w-100">Generar mi rutina personalizada 🚀</button>
  </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/beast-mascot.js') }}"></script>
<script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
<script src="{{ url_for('static', filename='js/exercises-catalog.js') }}"></script>
<script src="{{ url_for('static', filename='js/onboarding.js') }}"></script>
</body>
</html>
