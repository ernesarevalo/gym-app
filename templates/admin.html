<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GymApp - Panel de Administrador</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar px-3" style="background-color: var(--navbar-bg);">
  <span id="appLogo" class="navbar-brand app-logo mb-0 h1">💪 GymApp · Admin</span>
  <div class="d-flex gap-2">
    <button id="themeToggleBtn" class="theme-toggle-btn">🌙 Modo Oscuro</button>
    <a href="/dashboard" class="btn btn-outline-light btn-sm">⬅ Volver a la app</a>
  </div>
</nav>

<div class="container py-4">

  <div id="accesoDenegado" class="alert alert-danger d-none">
    No tenés permisos para ver esta página.
  </div>

  <div id="zonaAdmin" class="d-none">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
      <h4 class="mb-0">👑 Administración de usuarios</h4>
      <button id="btnNuevoUsuario" class="btn btn-primary btn-sm">+ Nuevo usuario</button>
    </div>

    <div id="adminMsg" class="alert d-none"></div>

    <input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar por nombre, usuario o correo...">

    <div class="table-responsive">
      <table class="table table-sm align-middle" style="color: var(--text);">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Usuario</th>
            <th>Correo</th>
            <th>Días</th>
            <th>Enfoque</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Modal: editar usuario -->
<div class="modal fade" id="modalEditar" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="background-color: var(--card-bg); color: var(--text);">
      <div class="modal-header">
        <h5 class="modal-title">Editar usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editUid">
        <div class="mb-2">
          <label class="form-label">Nombre</label>
          <input type="text" id="editNombre" class="form-control">
        </div>
        <div class="mb-2">
          <label class="form-label">Correo</label>
          <input type="email" id="editEmail" class="form-control">
        </div>
        <div class="mb-2">
          <label class="form-label">Días por semana</label>
          <input type="number" id="editDias" min="1" max="7" class="form-control">
        </div>
        <div class="mb-2">
          <label class="form-label">Enfoque</label>
          <select id="editEnfoque" class="form-select">
            <option value="Fuerza">Fuerza</option>
            <option value="Hipertrofia">Hipertrofia</option>
            <option value="Resistencia">Resistencia</option>
          </select>
        </div>
        <hr>
        <div class="mb-2">
          <label class="form-label">Nueva contraseña (dejar vacío para no cambiarla)</label>
          <input type="text" id="editPassword" class="form-control" minlength="6" placeholder="Mínimo 6 caracteres">
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnGuardarEdicion" class="btn btn-primary">Guardar cambios</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal: nuevo usuario -->
<div class="modal fade" id="modalNuevo" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="background-color: var(--card-bg); color: var(--text);">
      <div class="modal-header">
        <h5 class="modal-title">Crear nuevo usuario</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <label class="form-label">Nombre</label>
          <input type="text" id="nuevoNombre" class="form-control">
        </div>
        <div class="mb-2">
          <label class="form-label">Nombre de usuario</label>
          <input type="text" id="nuevoUsername" class="form-control">
        </div>
        <div class="mb-2">
          <label class="form-label">Correo</label>
          <input type="email" id="nuevoEmail" class="form-control">
        </div>
        <div class="mb-2">
          <label class="form-label">Contraseña</label>
          <input type="text" id="nuevoPassword" class="form-control" minlength="6">
        </div>
      </div>
      <div class="modal-footer">
        <button id="btnCrearUsuario" class="btn btn-primary">Crear usuario</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="{{ url_for('static', filename='js/theme.js') }}"></script>
<script src="{{ url_for('static', filename='js/beast-mascot.js') }}"></script>
<script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
<script>const ADMIN_EMAIL = "{{ admin_email }}";</script>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
